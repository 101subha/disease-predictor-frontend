<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI-Based Disease Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #f4f6fb;
}

.header {
  background: linear-gradient(135deg, #28c6ff, #5f6cff);
  padding: 30px;
  text-align: center;
  color: white;
}

.container {
  max-width: 900px;
  margin: -40px auto 40px;
  padding: 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  background: linear-gradient(135deg, #5f6cff, #7f53ff);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  opacity: 0.95;
}
</style>
</head>

<body>

<div class="header">
  <h1>🩺 AI-Based Disease Prediction</h1>
  <p>Smart Healthcare using Machine Learning</p>
</div>

<div class="container">

  <div class="card">
    <h3>🧾 Select Symptoms</h3>
    <select id="symptomSelect" multiple placeholder="Type at least 3–5 symptoms..."></select>
    <button onclick="predict()">🔍 Predict Disease</button>
  </div>

  <div class="card">
    <h3>📊 Prediction Result</h3>
    <div id="results">No prediction yet.</div>
  </div>

</div>

<script>

// ✅ FULL SYMPTOM LIST
const allSymptoms = [
"abdominal_pain","abnormal_menstruation","acidity","acute_liver_failure",
"altered_sensorium","anxiety","back_pain","belly_pain","blackheads",
"bladder_discomfort","blister","blood_in_sputum","bloody_stool",
"blurred_and_distorted_vision","breathlessness","brittle_nails","bruising",
"burning_micturition","chest_pain","chills","cold_hands_and_feets","coma",
"congestion","constipation","continuous_feel_of_urine","continuous_sneezing",
"cough","cramps","dark_urine","dehydration","depression","diarrhoea",
"dischromic _patches","distention_of_abdomen","dizziness",
"drying_and_tingling_lips","enlarged_thyroid","excessive_hunger",
"extra_marital_contacts","family_history","fast_heart_rate","fatigue",
"fluid_overload","foul_smell_of urine","headache","high_fever",
"hip_joint_pain","history_of_alcohol_consumption","increased_appetite",
"indigestion","inflammatory_nails","internal_itching",
"irregular_sugar_level","irritability","irritation_in_anus","itching",
"joint_pain","knee_pain","lack_of_concentration","lethargy",
"loss_of_appetite","loss_of_balance","loss_of_smell","malaise",
"mild_fever","mood_swings","movement_stiffness","mucoid_sputum",
"muscle_pain","muscle_wasting","muscle_weakness","nausea","neck_pain",
"nodal_skin_eruptions","obesity","pain_behind_the_eyes",
"pain_during_bowel_movements","pain_in_anal_region","painful_walking",
"palpitations","passage_of_gases","patches_in_throat","phlegm","polyuria",
"prominent_veins_on_calf","puffy_face_and_eyes","pus_filled_pimples",
"receiving_blood_transfusion","receiving_unsterile_injections",
"red_sore_around_nose","red_spots_over_body","redness_of_eyes",
"restlessness","runny_nose","rusty_sputum","scurring","shivering",
"silver_like_dusting","sinus_pressure","skin_peeling","skin_rash",
"slurred_speech","small_dents_in_nails","spinning_movements",
"spotting_ urination","stiff_neck","stomach_bleeding","stomach_pain",
"sunken_eyes","sweating","swelled_lymph_nodes","swelling_joints",
"swelling_of_stomach","swollen_blood_vessels","swollen_extremeties",
"swollen_legs","throat_irritation","toxic_look_(typhos)",
"ulcers_on_tongue","unsteadiness","visual_disturbances","vomiting",
"watering_from_eyes","weakness_in_limbs","weakness_of_one_body_side",
"weight_gain","weight_loss","yellow_crust_ooze","yellow_urine",
"yellowing_of_eyes","yellowish_skin"
];

// ✅ Initialize dropdown
const tom = new TomSelect("#symptomSelect", {
  plugins: ['remove_button'],
  maxItems: null,
  options: allSymptoms.map(s => ({
    value: s.trim().replaceAll(" ", "_"),
    text: s.replaceAll("_"," ")
  }))
});

// ✅ Prediction function
async function predict() {

  const symptoms = tom.getValue();

  if (!symptoms || symptoms.length === 0) {
    alert("Please select at least one symptom");
    return;
  }

  if (symptoms.length < 3) {
    alert("Please select at least 3 symptoms for better accuracy");
    return;
  }

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "Predicting...";

  try {
    const response = await fetch("https://disease-detector-qv6n.onrender.com/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ symptoms })
    });

    const data = await response.json();

    if (!data.predictions) {
      resultsDiv.innerHTML = "No result returned.";
      return;
    }

    resultsDiv.innerHTML = "";

    // 🎨 Color logic
    function getColor(prob) {
      if (prob > 0.7) return "#28c76f";
      if (prob > 0.4) return "#ff9f43";
      return "#ea5455";
    }

    // ⚠️ Low confidence warning
    if (data.predictions[0].probability < 0.4) {
      resultsDiv.innerHTML += `
        <div style="color:#ea5455; margin-bottom:15px;">
          ⚠️ Low confidence prediction. Please select more symptoms.
        </div>
      `;
    }

    // 🔥 Results UI
    data.predictions.forEach((item, index) => {

      const percent = (item.probability * 100).toFixed(2);
      const color = getColor(item.probability);

      resultsDiv.innerHTML += `
        <div style="
          margin-bottom:20px;
          padding:15px;
          border-radius:10px;
          background:${index === 0 ? "#f0f4ff" : "#fafafa"};
          border-left:6px solid ${color};
          box-shadow:0 4px 10px rgba(0,0,0,0.05);
        ">

          <div style="display:flex; justify-content:space-between;">
            <div>
              <strong style="font-size:16px;">
                ${index === 0 ? "🏆 " : ""}${item.disease}
              </strong>
            </div>
            <div style="font-weight:bold; color:${color};">
              ${percent}%
            </div>
          </div>

          <div style="margin-top:8px; background:#eee; height:10px; border-radius:5px;">
            <div style="
              height:10px;
              width:${percent}%;
              background:${color};
              border-radius:5px;
              transition:width 0.5s;
            "></div>
          </div>

        </div>
      `;
    });

    // 💡 Tip
    resultsDiv.innerHTML += `
      <div style="margin-top:10px; font-size:13px; color:#666;">
        💡 Tip: Select 4–6 symptoms for best accuracy
      </div>
    `;

  } catch (err) {
    resultsDiv.innerHTML = "Error connecting to API";
  }
}
</script>

</body>
</html>
