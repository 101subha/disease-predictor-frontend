<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI-Based Disease Prediction</title>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    margin: 0;
    background: #f4f7fb;
}

.app-container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

/* Header */
.app-header {
    text-align: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    padding: 30px;
    border-radius: 16px;
    margin-bottom: 30px;
}

/* Card */
.card {
    background: white;
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* Symptoms */
.symptom-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
}

.symptom-grid label {
    background: #f1f5f9;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
}

/* Button */
.predict-btn {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    cursor: pointer;
}

/* Loader */
.loader {
    display: none;
    text-align: center;
    margin: 30px 0;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #e5e7eb;
    border-top: 5px solid #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Results */
.result-item {
    background: #f8fafc;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

.result-item.top {
    border: 2px solid #6366f1;
    background: #eef2ff;
}

.badge {
    background: #22c55e;
    color: white;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 8px;
    margin-left: 8px;
}

.progress {
    background: #e5e7eb;
    height: 8px;
    border-radius: 8px;
    margin-top: 8px;
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="app-container">

    <div class="app-header">
        <h1><i class="fa-solid fa-heart-pulse"></i> AI-Based Disease Prediction</h1>
        <p>Smart Healthcare using Machine Learning</p>
    </div>

    <div class="card">
        <h2><i class="fa-solid fa-list-check"></i> Select Symptoms</h2>

        <div class="symptom-grid">
            <label><input type="checkbox" checked> Itching</label>
            <label><input type="checkbox"> Continuous Sneezing</label>
            <label><input type="checkbox"> Joint Pain</label>
            <label><input type="checkbox"> High Fever</label>

            <label><input type="checkbox" checked> Skin Rash</label>
            <label><input type="checkbox"> Shivering</label>
            <label><input type="checkbox"> Vomiting</label>
            <label><input type="checkbox"> Headache</label>

            <label><input type="checkbox" checked> Nodal Skin Eruptions</label>
            <label><input type="checkbox"> Chills</label>
            <label><input type="checkbox"> Fatigue</label>
            <label><input type="checkbox"> Cough</label>
        </div>

        <button class="predict-btn" onclick="predictDisease()">
            <i class="fa-solid fa-magnifying-glass"></i> Predict Disease
        </button>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Analyzing symptoms...</p>
    </div>

    <!-- Results -->
    <div class="card" id="result" style="display:none;">
        <h2><i class="fa-solid fa-stethoscope"></i> Prediction Result</h2>

        <div class="result-item top">
            <span>Fungal Infection <span class="badge">Top Match</span></span>
            <strong>22.40%</strong>
            <div class="progress"><div class="progress-bar" style="width:22.4%"></div></div>
        </div>

        <div class="result-item">
            <span>Chronic Cholestasis</span>
            <strong>15.28%</strong>
            <div class="progress"><div class="progress-bar" style="width:15.28%"></div></div>
        </div>

        <div class="result-item">
            <span>Drug Reaction</span>
            <strong>10.09%</strong>
            <div class="progress"><div class="progress-bar" style="width:10.09%"></div></div>
        </div>
    </div>

</div>

<script>
function predictDisease() {
    document.getElementById("loader").style.display = "block";
    document.getElementById("result").style.display = "none";

    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("result").style.display = "block";
    }, 2000);
}
</script>

</body>
</html>
