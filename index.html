<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI-Based Disease Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }
        h2 {
            text-align: center;
        }
        .container {
            max-width: 850px;
            background: white;
            padding: 25px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .symptoms {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        pre {
            background: #eee;
            padding: 15px;
            white-space: pre-wrap;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h2>AI-Based Disease Prediction</h2>

<div class="container">

    <h3>Select Symptoms</h3>

    <div class="symptoms">
        <!-- MUST MATCH DATASET FEATURES -->
        <label><input type="checkbox" value="itching"> itching</label>
        <label><input type="checkbox" value="skin_rash"> skin_rash</label>
        <label><input type="checkbox" value="nodal_skin_eruptions"> nodal_skin_eruptions</label>

        <label><input type="checkbox" value="continuous_sneezing"> continuous_sneezing</label>
        <label><input type="checkbox" value="shivering"> shivering</label>
        <label><input type="checkbox" value="chills"> chills</label>

        <label><input type="checkbox" value="joint_pain"> joint_pain</label>
        <label><input type="checkbox" value="vomiting"> vomiting</label>
        <label><input type="checkbox" value="fatigue"> fatigue</label>

        <label><input type="checkbox" value="high_fever"> high_fever</label>
        <label><input type="checkbox" value="headache"> headache</label>
        <label><input type="checkbox" value="cough"> cough</label>
    </div>

    <button onclick="predictDisease()">Predict Disease</button>

    <h3>Result</h3>
    <pre id="output">Waiting for input...</pre>

</div>

<script>
async function predictDisease() {

    const checked = document.querySelectorAll('input[type=checkbox]:checked');
    const symptoms = Array.from(checked).map(cb => cb.value);

    if (symptoms.length === 0) {
        alert("Please select at least one symptom");
        return;
    }

    document.getElementById("output").textContent = "Predicting...";

    try {
        const response = await fetch(
            "https://diseasedetector-sunita.onrender.com/predict",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ symptoms: symptoms })
            }
        );

        const data = await response.json();

        if (data.predictions) {
            let resultText = "Predicted Diseases:\n\n";

            data.predictions.forEach((item, index) => {
                resultText += `${index + 1}. ${item.disease} (Probability: ${(item.probability * 100).toFixed(2)}%)\n`;
            });

            document.getElementById("output").textContent = resultText;
        } else {
            document.getElementById("output").textContent = JSON.stringify(data, null, 2);
        }

    } catch (error) {
        document.getElementById("output").textContent = "Error connecting to API";
    }
}
</script>

</body>
</html>
