<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI-Based Disease Prediction</title>

<style>
:root {
  --primary: #5f6cff;
  --secondary: #7f53ff;
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #333;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #28c6ff, #5f6cff);
  padding: 30px 20px;
  text-align: center;
  color: white;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.header p {
  margin-top: 8px;
  opacity: 0.9;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: -40px auto 40px;
  padding: 20px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 14px;
  padding: 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  margin-bottom: 25px;
}

/* SYMPTOMS */
.symptoms {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

.symptom {
  display: flex;
  align-items: center;
  background: #f7f8ff;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
}

.symptom input {
  margin-right: 10px;
}

/* BUTTON */
button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-weight: 600;
  color: white;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  opacity: 0.95;
}

/* RESULTS */
.result-item {
  margin-bottom: 15px;
}

.result-header {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 5px;
}

.bar {
  background: #eaeafd;
  border-radius: 6px;
  overflow: hidden;
}

.bar-fill {
  height: 8px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  width: 0%;
}

/* TAG */
.tag {
  background: #28c76f;
  color: white;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: 8px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🩺 AI-Based Disease Prediction</h1>
  <p>Smart Healthcare using Machine Learning</p>
</div>

<div class="container">

  <!-- SYMPTOM CARD -->
  <div class="card">
    <h3>🧾 Select Symptoms</h3>

    <div class="symptoms">

  <label class="symptom">
    <input type="checkbox" value="itching"> Itching
  </label>

  <label class="symptom">
    <input type="checkbox" value="skin_rash"> Skin Rash
  </label>

  <label class="symptom">
    <input type="checkbox" value="nodal_skin_eruptions"> Nodal Skin Eruptions
  </label>

  <label class="symptom">
    <input type="checkbox" value="continuous_sneezing"> Continuous Sneezing
  </label>

  <label class="symptom">
    <input type="checkbox" value="shivering"> Shivering
  </label>

  <label class="symptom">
    <input type="checkbox" value="chills"> Chills
  </label>

  <label class="symptom">
    <input type="checkbox" value="joint_pain"> Joint Pain
  </label>

  <label class="symptom">
    <input type="checkbox" value="vomiting"> Vomiting
  </label>

  <label class="symptom">
    <input type="checkbox" value="fatigue"> Fatigue
  </label>

  <label class="symptom">
    <input type="checkbox" value="high_fever"> High Fever
  </label>

  <label class="symptom">
    <input type="checkbox" value="headache"> Headache
  </label>

  <label class="symptom">
    <input type="checkbox" value="cough"> Cough
  </label>

</div>


    <button onclick="predict()">🔍 Predict Disease</button>
  </div>

  <!-- RESULT CARD -->
  <div class="card">
    <h3>📊 Prediction Result</h3>
    <div id="results">No prediction yet.</div>
  </div>

</div>

<script>
async function predict() {
  const checked = document.querySelectorAll("input[type=checkbox]:checked");
  const symptoms = Array.from(checked).map(cb => cb.value);

  console.log("Selected Symptoms:", symptoms); // ✅ ADD THIS LINE

  if (symptoms.length === 0) {
    alert("Please select at least one symptom");
    return;
  }

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "Predicting...";

  try {
    const response = await fetch(
  "https://disease-detector-qv6n.onrender.com/predict",
  {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ symptoms })
  }
);

const data = await response.json();
console.log("API Response:", data); // ✅ HERE

    if (!data.predictions) {
      resultsDiv.innerHTML = "No result returned.";
      return;
    }

    resultsDiv.innerHTML = "";

    data.predictions.forEach((item, index) => {
      const percent = (item.probability * 100).toFixed(2);

      resultsDiv.innerHTML += `
        <div class="result-item">
          <div class="result-header">
            <div>
              <strong>${item.disease}</strong>
              ${index === 0 ? '<span class="tag">Top Match</span>' : ''}
            </div>
            <div>${percent}%</div>
          </div>
          <div class="bar">
            <div class="bar-fill" style="width:${percent}%"></div>
          </div>
        </div>
      `;
    });

  } catch (err) {
    resultsDiv.innerHTML = "Error connecting to API";
  }
}
</script>

</body>
</html>
